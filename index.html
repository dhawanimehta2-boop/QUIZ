<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="light-mode">
    <nav>
        <div class="logo">Quiz<span>Master</span></div>
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
    </nav>

    <main class="container">
        <header>
            <h1>Choose Your Challenge</h1>
            <p>Test your knowledge across various subjects!</p>
        </header>

        <div class="category-grid">
            <div class="card" onclick="location.href='/quiz/science'">
                <i class="fas fa-flask icon-science"></i>
                <h3>Science</h3>
                <p>Biology, Chemistry, Physics</p>
            </div>
            <div class="card" onclick="location.href='/quiz/math'">
                <i class="fas fa-calculator icon-math"></i>
                <h3>Math</h3>
                <p>Algebra, Geometry, Logic</p>
            </div>
            <div class="card" onclick="location.href='/quiz/history'">
                <i class="fas fa-monument icon-history"></i>
                <h3>History</h3>
                <p>World Events & Figures</p>
            </div>
            <div class="card" onclick="location.href='/quiz/general'">
                <i class="fas fa-globe icon-general"></i>
                <h3>General</h3>
                <p>Mixed Trivia</p>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
